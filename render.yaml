services:
  - type: web
    name: kiu-cbe-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kiu-cbe-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: kiu-cbe-db
    plan: free
    databaseName: kiu_cbe
    user: kiu_admin
